<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MeTTa Playground</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <script type="importmap">
    {
      "imports": {
        "swipl-wasm": "./js/swipl-wasm.mjs"
      }
    }
  </script>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-primary: #0d0f14;
      --bg-secondary: #13161e;
      --bg-panel: #181c26;
      --bg-panel-hover: #1e2330;
      --bg-editor: #111318;
      --border-color: #252a38;
      --border-glow: #3a4a7a;
      --accent-blue: #4f8ef7;
      --accent-purple: #a78bfa;
      --accent-cyan: #22d3ee;
      --accent-green: #34d399;
      --accent-red: #f87171;
      --accent-orange: #fb923c;
      --text-primary: #e2e8f0;
      --text-secondary: #8892a8;
      --text-muted: #4a5568;
      --glow-blue: rgba(79, 142, 247, 0.15);
      --glow-purple: rgba(167, 139, 250, 0.1);
      --shadow-lg: 0 25px 50px rgba(0, 0, 0, 0.6);
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 56px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      box-shadow: 0 0 16px var(--glow-blue);
    }

    .logo-text {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.3px;
    }

    .logo-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 20px;
      background: var(--bg-panel);
      color: var(--text-secondary);
      border: 1px solid var(--border-color);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .timeout-label {
      font-size: 12px;
      color: var(--text-muted);
    }

    .timeout-select {
      background: var(--bg-panel);
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 6px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }

    .timeout-select:hover {
      border-color: var(--border-glow);
    }

    /* ── Layout ── */
    .workspace {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr auto;
      gap: 0;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* ── Editor Panel ── */
    .editor-panel {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border-color);
      min-height: 0;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      flex-shrink: 0;
    }

    .panel-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .panel-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent-purple);
      box-shadow: 0 0 8px var(--accent-purple);
    }

    /* ── Toolbar ── */
    .editor-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border-color);
      flex-shrink: 0;
    }

    .examples-label {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .example-chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .chip {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--bg-editor);
      border: 1px solid var(--border-color);
      color: var(--accent-cyan);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .chip:hover {
      border-color: var(--accent-cyan);
      background: rgba(34, 211, 238, 0.08);
      transform: translateY(-1px);
    }

    /* ── Code Editor ── */
    .code-editor-wrapper {
      flex: 1;
      position: relative;
      overflow: hidden;
      min-height: 0;
    }

    .line-numbers {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 48px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border-color);
      padding: 16px 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 1;
    }

    .line-number {
      display: block;
      height: 24px;
      line-height: 24px;
      text-align: right;
      padding-right: 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-muted);
      user-select: none;
    }

    #code-editor {
      position: absolute;
      inset: 0;
      padding: 16px 16px 16px 64px;
      background: var(--bg-editor);
      color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      line-height: 24px;
      border: none;
      outline: none;
      resize: none;
      width: 100%;
      height: 100%;
      tab-size: 2;
      white-space: pre;
      overflow-wrap: normal;
      overflow-x: auto;
      caret-color: var(--accent-blue);
    }

    #code-editor::placeholder {
      color: var(--text-muted);
    }

    #code-editor:focus {
      box-shadow: inset 0 0 0 1px rgba(79, 142, 247, 0.2);
    }

    /* ── Run Bar ── */
    .run-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border-color);
      flex-shrink: 0;
    }

    .btn-run {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 22px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      color: #fff;
      transition: all 0.2s;
      box-shadow: 0 0 20px var(--glow-blue);
      position: relative;
      overflow: hidden;
      white-space: nowrap;
    }

    .btn-run::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn-run:hover::before { opacity: 1; }
    .btn-run:hover { transform: translateY(-1px); box-shadow: 0 4px 25px var(--glow-blue); }
    .btn-run:active { transform: translateY(0); }
    .btn-run:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-stop {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 16px;
      border-radius: 8px;
      border: 1px solid var(--accent-red);
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      background: rgba(248, 113, 113, 0.1);
      color: var(--accent-red);
      transition: all 0.2s;
      display: none;
    }

    .btn-stop:hover {
      background: rgba(248, 113, 113, 0.2);
      transform: translateY(-1px);
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
      margin-left: auto;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: all 0.3s;
    }

    .status-dot.running {
      background: var(--accent-orange);
      box-shadow: 0 0 8px var(--accent-orange);
      animation: pulse-dot 1s infinite;
    }

    .status-dot.success {
      background: var(--accent-green);
      box-shadow: 0 0 8px var(--accent-green);
    }

    .status-dot.error {
      background: var(--accent-red);
      box-shadow: 0 0 8px var(--accent-red);
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }

    /* ── Output Panel ── */
    .output-panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .output-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border-color);
      background: var(--bg-secondary);
      flex-shrink: 0;
    }

    .tab-btn {
      padding: 10px 18px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      transition: all 0.15s;
    }

    .tab-btn:hover { color: var(--text-secondary); }

    .tab-btn.active {
      color: var(--accent-blue);
      border-bottom-color: var(--accent-blue);
    }

    .tab-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
      height: 18px;
      border-radius: 9px;
      background: var(--bg-panel);
      font-size: 10px;
      padding: 0 5px;
      margin-left: 6px;
      color: var(--text-secondary);
    }

    .output-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      min-height: 0;
      background: var(--bg-editor);
      position: relative;
    }

    .output-area::-webkit-scrollbar {
      width: 6px;
    }

    .output-area::-webkit-scrollbar-track {
      background: transparent;
    }

    .output-area::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 3px;
    }

    /* ── Output View ── */
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-height: 200px;
      gap: 12px;
      color: var(--text-muted);
      text-align: center;
    }

    .empty-icon {
      font-size: 40px;
      opacity: 0.3;
    }

    .empty-title {
      font-size: 14px;
      font-weight: 500;
    }

    .empty-sub {
      font-size: 12px;
    }

    /* Results */
    .result-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 14px;
      margin-bottom: 6px;
      border-radius: 8px;
      background: var(--bg-panel);
      border: 1px solid var(--border-color);
      animation: slide-in 0.2s ease;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
    }

    .result-item.ok {
      border-left: 3px solid var(--accent-green);
    }

    .result-item.stderr-line {
      border-left: 3px solid var(--accent-red);
    }

    .result-item.stdout-line {
      border-left: 3px solid var(--accent-blue);
    }

    .result-index {
      font-size: 10px;
      color: var(--text-muted);
      min-width: 22px;
      padding-top: 2px;
    }

    .result-value {
      flex: 1;
      word-break: break-all;
      line-height: 1.6;
    }

    .result-value.green { color: var(--accent-green); }
    .result-value.red { color: var(--accent-red); }
    .result-value.blue { color: var(--accent-blue); }
    .result-value.normal { color: var(--text-primary); }

    /* Log lines */
    .log-line {
      display: flex;
      gap: 10px;
      padding: 4px 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12.5px;
      line-height: 1.6;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      animation: slide-in 0.15s ease;
    }

    .log-line:last-child { border-bottom: none; }

    .log-prefix {
      color: var(--text-muted);
      flex-shrink: 0;
      font-size: 10px;
      padding-top: 2px;
    }

    .log-prefix.out { color: var(--accent-blue); }
    .log-prefix.err { color: var(--accent-red); }

    .log-text { flex: 1; word-break: break-all; }
    .log-text.out { color: var(--text-primary); }
    .log-text.err { color: var(--accent-red); }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Summary Bar ── */
    .summary-bar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 9px 20px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border-color);
      font-size: 12px;
      flex-shrink: 0;
    }

    .summary-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid var(--border-color);
      background: var(--bg-panel);
      color: var(--text-secondary);
    }

    .summary-pill .val {
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
    }

    .summary-pill.ok .val { color: var(--accent-green); }
    .summary-pill.err .val { color: var(--accent-red); }
    .summary-pill.time .val { color: var(--accent-cyan); }
    .summary-pill.warn .val { color: var(--accent-orange); }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Error Banner ── */
    .error-banner {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 16px;
      background: rgba(248, 113, 113, 0.08);
      border: 1px solid rgba(248, 113, 113, 0.3);
      border-radius: 8px;
      margin-bottom: 12px;
      animation: slide-in 0.2s ease;
    }

    .error-banner-icon { font-size: 16px; }

    .error-banner-body { flex: 1; }

    .error-banner-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent-red);
      margin-bottom: 4px;
    }

    .error-banner-msg {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-secondary);
      word-break: break-word;
    }

    /* ── Responsive ── */
    @media (max-width: 700px) {
      .workspace {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 1fr auto;
      }

      .editor-panel { border-right: none; border-bottom: 1px solid var(--border-color); }

      .summary-bar { grid-column: 1; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⚛</div>
    <span class="logo-text">MeTTa</span>
    <span class="logo-badge">Playground</span>
  </div>
  <div class="header-right">
    <span class="timeout-label">Timeout:</span>
    <select class="timeout-select" id="timeout-select">
      <option value="5000">5 s</option>
      <option value="10000">10 s</option>
      <option value="30000">30 s</option>
      <option value="60000">60 s</option>
      <option value="0">None</option>
    </select>
  </div>
</header>

<div class="workspace">

  <!-- ── Left: Editor ── -->
  <div class="editor-panel">
    <div class="panel-header">
      <div class="panel-title">
        <div class="panel-dot"></div>
        Editor
      </div>
    </div>

    <div class="editor-toolbar">
      <span class="examples-label">Examples:</span>
      <div class="example-chips" id="example-chips"></div>
    </div>

    <div class="code-editor-wrapper">
      <div class="line-numbers" id="line-numbers"></div>
      <textarea
        id="code-editor"
        spellcheck="false"
        autocorrect="off"
        autocapitalize="off"
        autocomplete="off"
        placeholder="; Write MeTTa code here&#10;; e.g.: !(+ 1 2)"
      ></textarea>
    </div>

    <div class="run-bar">
      <button class="btn-run" id="btn-run">
        <span id="run-btn-icon">▶</span>
        <span id="run-btn-label">Run</span>
      </button>
      <button class="btn-stop" id="btn-stop">■ Stop</button>
      <div class="status-indicator">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">Idle</span>
      </div>
    </div>
  </div>

  <!-- ── Right: Output ── -->
  <div class="output-panel">
    <div class="output-tabs">
      <button class="tab-btn active" data-tab="results" id="tab-results">
        Results<span class="tab-badge" id="badge-results">0</span>
      </button>
      <button class="tab-btn" data-tab="stdout" id="tab-stdout">
        Stdout<span class="tab-badge" id="badge-stdout">0</span>
      </button>
      <button class="tab-btn" data-tab="stderr" id="tab-stderr">
        Stderr<span class="tab-badge" id="badge-stderr">0</span>
      </button>
    </div>

    <div class="output-area">
      <div class="tab-content active" id="tab-content-results">
        <div class="empty-state" id="empty-results">
          <div class="empty-icon">◈</div>
          <div class="empty-title">No results yet</div>
          <div class="empty-sub">Run some MeTTa code to see output here</div>
        </div>
        <div id="results-list"></div>
      </div>

      <div class="tab-content" id="tab-content-stdout">
        <div class="empty-state" id="empty-stdout">
          <div class="empty-icon">▨</div>
          <div class="empty-title">No stdout output</div>
          <div class="empty-sub">Prolog print statements will appear here</div>
        </div>
        <div id="stdout-list"></div>
      </div>

      <div class="tab-content" id="tab-content-stderr">
        <div class="empty-state" id="empty-stderr">
          <div class="empty-icon">▤</div>
          <div class="empty-title">No errors</div>
          <div class="empty-sub">Any warnings or errors will appear here</div>
        </div>
        <div id="stderr-list"></div>
      </div>
    </div>
  </div>

  <!-- ── Bottom: Summary ── -->
  <div class="summary-bar" id="summary-bar">
    <div class="summary-pill time">
      <span>Duration</span>
      <span class="val" id="sum-duration">—</span>
    </div>
    <div class="summary-pill ok" id="sum-status-pill">
      <span>Status</span>
      <span class="val" id="sum-status">—</span>
    </div>
    <div class="summary-pill">
      <span>Results</span>
      <span class="val" id="sum-results">—</span>
    </div>
  </div>

</div>

<script type="module">
  import { runMetta, cancelCurrentRun } from './js/metta-orchestrator.mjs';

  // ── Example snippets ──────────────────────────────────────────────
  const EXAMPLES = [
    { label: '+ 1 2',    code: '!(+ 1 2)\n' },
    { label: 'match',    code: '; Store and retrieve\n!(bind! &space (new-space))\n!(add-atom &space (= foo 42))\n!(match &space (= foo $x) $x)\n' },
    { label: 'let',      code: '!(let $x 10\n  (let $y 20\n    (+ $x $y)))\n' },
    { label: 'car/cdr',  code: '!(car-atom (1 2 3))\n!(cdr-atom (1 2 3))\n' },
    { label: 'if',       code: '!(if True yes no)\n!(if False yes no)\n' },
  ];

  // ── DOM refs ──────────────────────────────────────────────────────
  const editor        = document.getElementById('code-editor');
  const lineNumbers   = document.getElementById('line-numbers');
  const btnRun        = document.getElementById('btn-run');
  const btnStop       = document.getElementById('btn-stop');
  const runIcon       = document.getElementById('run-btn-icon');
  const runLabel      = document.getElementById('run-btn-label');
  const statusDot     = document.getElementById('status-dot');
  const statusText    = document.getElementById('status-text');
  const timeoutSel    = document.getElementById('timeout-select');

  const resultsList   = document.getElementById('results-list');
  const stdoutList    = document.getElementById('stdout-list');
  const stderrList    = document.getElementById('stderr-list');

  const emptyResults  = document.getElementById('empty-results');
  const emptyStdout   = document.getElementById('empty-stdout');
  const emptyStderr   = document.getElementById('empty-stderr');

  const badgeResults  = document.getElementById('badge-results');
  const badgeStdout   = document.getElementById('badge-stdout');
  const badgeStderr   = document.getElementById('badge-stderr');

  const sumDuration   = document.getElementById('sum-duration');
  const sumStatus     = document.getElementById('sum-status');
  const sumStatusPill = document.getElementById('sum-status-pill');
  const sumResults    = document.getElementById('sum-results');

  // ── Line numbers ──────────────────────────────────────────────────
  function updateLineNumbers() {
    const lines = editor.value.split('\n');
    lineNumbers.innerHTML = lines
      .map((_, i) => `<span class="line-number">${i + 1}</span>`)
      .join('');
  }

  editor.addEventListener('input', updateLineNumbers);
  editor.addEventListener('scroll', () => {
    lineNumbers.scrollTop = editor.scrollTop;
  });

  // Tab key inserts spaces instead of switching focus
  editor.addEventListener('keydown', (e) => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const start = editor.selectionStart;
      const end   = editor.selectionEnd;
      editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
      editor.selectionStart = editor.selectionEnd = start + 2;
      updateLineNumbers();
    }
    // Ctrl/Cmd+Enter to run
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      if (!btnRun.disabled) handleRun();
    }
  });

  // ── Example chips ─────────────────────────────────────────────────
  const chipsContainer = document.getElementById('example-chips');
  EXAMPLES.forEach(({ label, code }) => {
    const chip = document.createElement('button');
    chip.className = 'chip';
    chip.textContent = label;
    chip.addEventListener('click', () => {
      editor.value = code;
      updateLineNumbers();
      editor.focus();
    });
    chipsContainer.appendChild(chip);
  });

  // ── Tab switching ─────────────────────────────────────────────────
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const tab = btn.dataset.tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(`tab-content-${tab}`).classList.add('active');
    });
  });

  // ── State helpers ─────────────────────────────────────────────────
  let running = false;

  function setRunning(val) {
    running = val;
    btnRun.disabled = val;
    btnStop.style.display = val ? 'flex' : 'none';
    if (val) {
      runIcon.innerHTML = '<span class="spinner"></span>';
      runLabel.textContent = 'Running…';
      statusDot.className = 'status-dot running';
      statusText.textContent = 'Running';
    } else {
      runIcon.textContent = '▶';
      runLabel.textContent = 'Run';
    }
  }

  function setStatus(label, dotClass) {
    statusDot.className = `status-dot ${dotClass}`;
    statusText.textContent = label;
  }

  function clearOutputs() {
    resultsList.innerHTML = '';
    stdoutList.innerHTML  = '';
    stderrList.innerHTML  = '';
    emptyResults.style.display  = 'flex';
    emptyStdout.style.display   = 'flex';
    emptyStderr.style.display   = 'flex';
    badgeResults.textContent    = '0';
    badgeStdout.textContent     = '0';
    badgeStderr.textContent     = '0';
    sumDuration.textContent     = '—';
    sumStatus.textContent       = '—';
    sumResults.textContent      = '—';
    sumStatusPill.className     = 'summary-pill ok';
  }

  let stdoutCount = 0;
  let stderrCount = 0;

  function appendStdout(line) {
    emptyStdout.style.display = 'none';
    stdoutCount++;
    badgeStdout.textContent = String(stdoutCount);
    const el = document.createElement('div');
    el.className = 'log-line';
    el.innerHTML = `<span class="log-prefix out">OUT</span><span class="log-text out">${escHtml(line)}</span>`;
    stdoutList.appendChild(el);
    stdoutList.scrollIntoView?.({ behavior: 'smooth', block: 'end' });
  }

  function appendStderr(line) {
    emptyStderr.style.display = 'none';
    stderrCount++;
    badgeStderr.textContent = String(stderrCount);
    const el = document.createElement('div');
    el.className = 'log-line';
    el.innerHTML = `<span class="log-prefix err">ERR</span><span class="log-text err">${escHtml(line)}</span>`;
    stderrList.appendChild(el);
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function displayResults(result) {
    const { ok, results, stdout, stderr, error, timed_out, canceled, duration_ms } = result;

    // Duration
    sumDuration.textContent = duration_ms != null ? `${duration_ms} ms` : '—';

    // Error banner first
    if (error) {
      emptyResults.style.display = 'none';
      const banner = document.createElement('div');
      banner.className = 'error-banner';
      const code = timed_out ? 'Timeout' : canceled ? 'Canceled' : (error.type || 'Error');
      banner.innerHTML = `
        <div class="error-banner-icon">⚠</div>
        <div class="error-banner-body">
          <div class="error-banner-title">${escHtml(code)}</div>
          <div class="error-banner-msg">${escHtml(error.message || '')}</div>
        </div>`;
      resultsList.prepend(banner);
    }

    // Results list
    if (Array.isArray(results) && results.length > 0) {
      emptyResults.style.display = 'none';
      badgeResults.textContent = String(results.length);
      sumResults.textContent   = String(results.length);
      results.forEach((val, i) => {
        const el = document.createElement('div');
        el.className = 'result-item ok';
        const display = typeof val === 'object' ? JSON.stringify(val) : String(val);
        el.innerHTML = `
          <span class="result-index">[${i}]</span>
          <span class="result-value green">${escHtml(display)}</span>`;
        resultsList.appendChild(el);
      });
    } else if (!error) {
      badgeResults.textContent = '0';
      sumResults.textContent   = '0';
    }

    // Status summary
    if (timed_out) {
      setStatus('Timed out', 'error');
      sumStatus.textContent = 'Timeout';
      sumStatusPill.className = 'summary-pill err';
    } else if (canceled) {
      setStatus('Canceled', '');
      sumStatus.textContent = 'Canceled';
      sumStatusPill.className = 'summary-pill warn';
    } else if (ok) {
      setStatus('Done', 'success');
      sumStatus.textContent = 'OK';
      sumStatusPill.className = 'summary-pill ok';
    } else {
      setStatus('Error', 'error');
      sumStatus.textContent = 'Error';
      sumStatusPill.className = 'summary-pill err';
    }
  }

  // ── Run handler ───────────────────────────────────────────────────
  async function handleRun() {
    const code = editor.value.trim();
    if (!code) return;

    clearOutputs();
    stdoutCount = 0;
    stderrCount = 0;
    setRunning(true);

    const timeoutMs = parseInt(timeoutSel.value, 10);

    try {
      const result = await runMetta({
        code,
        timeoutMs: timeoutMs || 0,
        silent: false,
        onEvent(event) {
          if (event.type === 'stdout') appendStdout(event.line);
          else if (event.type === 'stderr') appendStderr(event.line);
          else if (event.type === 'status') {
            const labels = {
              starting: 'Starting…',
              initializing: 'Initializing…',
              running: 'Running…',
              timeout: 'Timed out',
              canceled: 'Canceled',
            };
            statusText.textContent = labels[event.phase] ?? event.phase;
          }
        },
      });

      displayResults(result);
    } catch (err) {
      setStatus('Error', 'error');
      appendStderr(err?.message || String(err));
    } finally {
      setRunning(false);
    }
  }

  btnRun.addEventListener('click', handleRun);

  btnStop.addEventListener('click', () => {
    cancelCurrentRun();
  });

  // ── Init ──────────────────────────────────────────────────────────
  editor.value = '!(+ 1 2)\n';
  updateLineNumbers();
  editor.focus();
</script>

</body>
</html>
