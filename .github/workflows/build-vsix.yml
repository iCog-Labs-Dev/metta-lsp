name: Build VSIX

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  prebuilds:
    name: Native prebuild (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
          - os: windows-latest
            label: windows
          - os: macos-latest
            label: macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            grammar/package-lock.json

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Install grammar dependencies
        run: npm ci --prefix grammar

      - name: Build grammar prebuild
        run: npm run grammar:prebuild

      - name: Verify current platform prebuild
        run: npm run verify:prebuilds:current

      - name: Upload grammar prebuilds
        uses: actions/upload-artifact@v4
        with:
          name: prebuilds-${{ matrix.label }}
          path: grammar/prebuilds/*
          if-no-files-found: error

  package:
    name: Package extension
    runs-on: ubuntu-latest
    needs: prebuilds

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            grammar/package-lock.json

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Download grammar prebuilds
        uses: actions/download-artifact@v4
        with:
          pattern: prebuilds-*
          merge-multiple: true
          path: grammar/prebuilds

      - name: Verify release prebuild set
        run: npm run verify:prebuilds:release

      - name: Package VSIX
        run: npm run package:release

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: metta-lsp-vsix
          path: "*.vsix"
          if-no-files-found: error
